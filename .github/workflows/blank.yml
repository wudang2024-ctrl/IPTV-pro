name: Build & Auto-Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 支持在 GitHub 页面上手动点击运行

# 必须显式赋予写权限，否则工作流无法打 Tag 和创建 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 步骤 1: 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    # 步骤 2: 配置 JDK 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 步骤 3: 引入官方 Gradle 支持
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        validate-wrappers: false

    # 步骤 4: 给 gradlew 赋予执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 步骤 5: 重新下载并修复损坏的 Gradle Wrapper 结构
    - name: Regenerate Gradle Wrapper to fix corruption
      run: gradle wrapper

    # 步骤 6: 自动生成临时的 debug.keystore 签名，避免编译报错
    - name: Generate Dummy Debug Keystore
      run: |
        if [ ! -f "debug.keystore" ]; then
          echo "debug.keystore not found. Generating a dummy one..."
          keytool -genkey -v -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
        else
          echo "debug.keystore already exists."
        fi

    # 步骤 7: 自动修改 App 内部版本号 (versionCode & versionName)
    - name: Auto Set App Version
      run: |
        VERSION_CODE="${{ github.run_number }}"
        VERSION_NAME="1.0.${{ github.run_number }}"
        echo "Auto-incrementing version: Code=$VERSION_CODE, Name=$VERSION_NAME"
        
        if [ -f "app/build.gradle" ]; then
          sed -i -E "s/(versionCode\s*=?\s*)[0-9]+/\1$VERSION_CODE/g" app/build.gradle
          sed -i -E "s/(versionName\s*=?\s*\")[^\"]+(\")/\1$VERSION_NAME\2/g" app/build.gradle
        fi
        if [ -f "app/build.gradle.kts" ]; then
          sed -i -E "s/(versionCode\s*=?\s*)[0-9]+/\1$VERSION_CODE/g" app/build.gradle.kts
          sed -i -E "s/(versionName\s*=?\s*\")[^\"]+(\")/\1$VERSION_NAME\2/g" app/build.gradle.kts
        fi

    # 步骤 8: 执行 Gradle 编译命令打包 APK
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon

    # 步骤 9: 收集构建完成的 APK 存入 Actions 临时缓存中
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk

    # 步骤 10: 自动在 GitHub 创建 Release 并上传生成的 APK 文件
    - name: Create GitHub Release & Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          ### 🤖 编译完成，APK 自动发布通知
          本项目已通过 GitHub Actions 自动构建成功！
          
          * **版本代码 (Version Code):** `${{ github.run_number }}`
          * **版本名称 (Version Name):** `1.0.${{ github.run_number }}`
          * **构建分支:** `${{ github.ref_name }}`
          * **提交哈希:** `${{ github.sha }}`
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
